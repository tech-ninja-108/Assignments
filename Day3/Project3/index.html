<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Squid Game Landing Page</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="website">
      <!-- Navbar -->
      <nav class="navbar">
        <a href="#" class="top-logo">
          <span>SQUID</span>
          <strong>GAME</strong>
        </a>

        <div class="nav-links">
          <a href="#about">About</a>
          <a href="#watch" class="active">Watch now</a>
          <a href="#actors">Actors</a>
          <a href="#contact">Contact</a>
        </div>

        <button class="menu-button" aria-label="Open navigation menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>

      <!-- Hero section -->
      <section class="hero" id="about">
        <!-- Left content -->
        <div class="hero-content">
          <div class="main-title">
            <div class="title-row">
              <span class="squid-title">
                SQ<span class="round-letter">U</span>ID
              </span>

              <span class="blue-symbol">◆</span>
            </div>

            <div class="title-row game-row">
              <span class="yellow-symbol">◆</span>

              <span class="game-title">
                G<span class="pink-letter">A</span>ME
              </span>
            </div>
          </div>

          <p class="description">
            Action / Thriller / Drama Series directed by Dong-hyuk Hwang
            <br />
            Season 1: 9 Episodes
          </p>

          <div class="hero-buttons">
            <a href="#watch" class="play-button">
              <span class="play-circle">▶</span>
              Play Now
            </a>

            <a href="#watch" class="trailer-button">
              <span>▷</span>
              Watch Trailer
            </a>
          </div>
        </div>

        <!-- Scroll indicator -->
        <div class="scroll-area">
          <span>SCROLL</span>
          <div class="scroll-line"></div>
        </div>

        <!-- Main character image -->
        <div class="character-area">
          <div class="character-circle"></div>

          <img
            src="https://i.pinimg.com/736x/fd/c2/f5/fdc2f56d8636e6e3478d05f9c345a2d6.jpg"
            alt="Masked futuristic character"
          />

          <div class="square-symbol">□</div>
        </div>

        <!-- Social links -->
        <div class="social-links">
          <a href="#" aria-label="Twitter">♡</a>
          <a href="#" aria-label="Instagram">◎</a>
          <a href="#" aria-label="Facebook">f</a>
        </div>

        <div class="vertical-title">SQUID</div>
      </section>

      <!-- Decorative background text -->
      <div class="background-title">GAME</div>

      <!-- Video cards -->
      <section class="videos" id="watch">
        <article class="video-card">
          <img
            src="https://images.unsplash.com/photo-1531058020387-3be344556be6?auto=format&fit=crop&w=900&q=85"
            alt="Red masked group"
          />

          <div class="video-content">
            <span>○ □ △</span>
            <strong>SQUID GAME</strong>
          </div>

          <button aria-label="Play first video">▶</button>
        </article>

        <article class="video-card">
          <img
            src="https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=900&q=85"
            alt="Futuristic masked guard"
          />

          <button aria-label="Play second video">▶</button>
        </article>

        <article class="video-card">
          <img
            src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=900&q=85"
            alt="Dark science fiction group"
          />

          <button aria-label="Play third video">▶</button>
        </article>
      </section>
    </main>
  </body>
</html>
